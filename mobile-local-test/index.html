<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>open-akquise Local Test</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <h1>open-akquise Local Test</h1>
                <p>Lokale App-Oberflaeche mit Supabase als Online-Datenquelle</p>
            </div>
            <button id="reloadBtn" type="button">Neu laden</button>
        </header>

        <section class="card">
            <h2>Setup</h2>
            <div class="grid two">
                <label>
                    <span>Supabase URL</span>
                    <input id="supabaseUrl" type="url" placeholder="https://...supabase.co" />
                </label>
                <label>
                    <span>Supabase Anon Key</span>
                    <input id="supabaseKey" type="password" placeholder="supabase-anon-key" />
                </label>
                <label>
                    <span>Tabelle</span>
                    <input id="tableName" type="text" value="immobilien" />
                </label>
                <label>
                    <span>App Passwort (Test)</span>
                    <input id="appPassword" type="password" placeholder="Passwort aus ENV/Setup eintragen" />
                </label>
            </div>
            <div class="actions">
                <button id="saveConfigBtn" type="button">Setup speichern</button>
                <span id="setupStatus" class="status"></span>
            </div>
        </section>

        <section class="card">
            <h2>Login / Filter</h2>
            <div class="grid three">
                <label>
                    <span>Passwort</span>
                    <input id="loginPassword" type="password" placeholder="Passwort eingeben" />
                </label>
                <label>
                    <span>Rolle</span>
                    <select id="roleSelect">
                        <option value="teamleiter">Teamleiter</option>
                        <option value="agent">Agent</option>
                    </select>
                </label>
                <label>
                    <span>Agent Name</span>
                    <input id="agentName" type="text" placeholder="z.B. Markus" />
                </label>
            </div>
            <div class="grid one">
                <label>
                    <span>Suche</span>
                    <input id="searchInput" type="text" placeholder="Titel, PLZ, Ort, ID, Status..." />
                </label>
            </div>
            <div class="actions">
                <button id="loginBtn" type="button">Einloggen & Laden</button>
                <span id="loginStatus" class="status"></span>
            </div>
        </section>

        <section class="stats-grid">
            <article class="stat-card">
                <h3>Eintraege</h3>
                <div id="statTotal" class="value">0</div>
            </article>
            <article class="stat-card">
                <h3>Verkauft</h3>
                <div id="statSold" class="value">0</div>
            </article>
            <article class="stat-card">
                <h3>Offen</h3>
                <div id="statOpen" class="value">0</div>
            </article>
            <article class="stat-card">
                <h3>Gefiltert</h3>
                <div id="statFiltered" class="value">0</div>
            </article>
        </section>

        <section class="card">
            <h2>Objekte</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>immobilien ID</th>
                            <th>Titel</th>
                            <th>PLZ / Ort</th>
                            <th>Status</th>
                            <th>Betreut von</th>
                            <th>Kaufpreis</th>
                        </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>
</html>
